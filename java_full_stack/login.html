<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
      }

      .login-card {
        max-width: 400px;
        margin: 100px auto;
        padding: 30px;
        background-color: white;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="login-card">
        <h2 class="text-center mb-4">Login</h2>

        <form>
          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control"
              placeholder="Enter your email"
              required
            />
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="Enter your password"
              required
            />
          </div>

          <!-- Remember Me -->
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label" for="remember"> Remember Me </label>
          </div>

          <!-- Login Button -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Login</button>
          </div>

          <!-- Register Link -->
          <p class="text-center mt-3">
            Don't have an account?
            <a href="register.html">Register</a>
          </p>
        </form>
      </div>
    </div>
  </body>
  <script>
    document.querySelector("form").addEventListener("submit", async (e) => {
      e.preventDefault()

      const email = document.querySelector('input[type="email"]').value
      const password = document.querySelector('input[type="password"]').value

      try {
        // 1. Sent POST request to the backend login endpoint
        const response = await fetch("http://localhost:8080/register/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        })

        // 2. Handle the response based on the HTTP Status Code
        if (response.ok) {
          // Status 200 OK -> Read the user object from the backend response
          const user = await response.json()

          // CRITICAL: Store the unique user ID into localStorage
          localStorage.setItem("userId", user.id)

          alert("Login successful!")
          window.location.href = "dashboard.html"
        } else if (response.status === 401) {
          // Status 401 UNAUTHORIZED (Incorrect password)
          const errorMessage = await response.text()
          alert("Login Failed: " + errorMessage)
        } else if (response.status === 404) {
          // Status 404 NOT FOUND (Email not registered)
          const errorMessage = await response.text()
          alert("Login Failed: " + errorMessage)
        } else {
          // Any other unexpected error (e.g., 500 Server Error)
          alert("An unexpected error occurred. Please try again.")
        }
      } catch (error) {
        // Handles network issues (e.g., Spring Boot application isn't running)
        console.error("Error during fetch:", error)
        alert("Cannot connect to the server. Is your backend running?")
      }
    })
  </script>
</html>
